<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LGA Total Results</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="mb-4">Summed Results by LGA</h2>
        
        <form method="POST" class="mb-5 p-4 border rounded bg-white shadow-sm">
            <div class="mb-3">
                <label for="lga_id" class="form-label">Select Local Government:</label>
                <select name="lga_id" id="lga_id" class="form-select">
                    {% for lga in lgas %}
                    <option value="{{ lga.lga_id }}">{{ lga.lga_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn btn-success">View Summed Results</button>
        </form>

        {% if results %}
        <table class="table table-hover table-bordered bg-white shadow-sm">
            <thead class="table-info">
                <tr>
                    <th>Political Party</th>
                    <th>Total Summed Score</th>
                </tr>
            </thead>
            <tbody>
                {% for row in results %}
                <tr>
                    <td><strong>{{ row.party_abbreviation }}</strong></td>
                    <td>{{ row.total_score }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        {% endif %}
    </div>
</body>
</html>
