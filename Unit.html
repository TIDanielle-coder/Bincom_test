<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polling Unit Results</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="mb-4">Results for Polling Unit #{{ unit_id }}</h2>
        <table class="table table-striped table-bordered shadow-sm bg-white">
            <thead class="table-dark">
                <tr>
                    <th>Party</th>
                    <th>Score</th>
                    <th>Entered By</th>
                </tr>
            </thead>
            <tbody>
                {% for row in results %}
                <tr>
                    <td>{{ row.party_abbreviation }}</td>
                    <td>{{ row.party_score }}</td>
                    <td>{{ row.entered_by_user }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <a href="/lga" class="btn btn-primary">Check LGA Totals</a>
    </div>
</body>
</html>
