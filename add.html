<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Results</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="mb-4">Store New Polling Unit Results</h2>
        <div class="card shadow">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Polling Unit Unique ID:</label>
                        <input type="number" name="unit_id" class="form-control" required placeholder="e.g. 27">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Party Abbreviation:</label>
                        <select name="party" class="form-select">
                            <option value="PDP">PDP</option>
                            <option value="ACN">ACN</option>
                            <option value="CPC">CPC</option>
                            <option value="ANPP">ANPP</option>
                            <option value="LABOUR">LABOUR</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Party Score:</label>
                        <input type="number" name="score" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-danger w-100">Submit Result</button>
                </form>
            </div>
        </div>
        <p class="mt-3 text-muted">Note: Ensure the Unique ID exists in the polling_unit table.</p>
    </div>
</body>
</html>
